apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: request-personal-information-ingress-development
  namespace: request-personal-information-development
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: app-secrets
    external-dns.alpha.kubernetes.io/set-identifier: request-personal-information-ingress-development-request-personal-information-development-green
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDefaultAction "phase:2,pass,log,tag:github_team=central-digital-product-team,tag:namespace=request-personal-information-development"
spec:
  ingressClassName: modsec
  tls:
  - hosts:
    - request-personal-information-development.apps.live.cloud-platform.service.justice.gov.uk
  rules:
  - host: request-personal-information-development.apps.live.cloud-platform.service.justice.gov.uk
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: request-personal-information-service-development
            port:
              number: 80
